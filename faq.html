<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!-- Feuilles existantes -->
    <link rel="stylesheet" href="https://teagan-eleov.github.io/burn-font-host/style.css" />
    <link rel="stylesheet" href="https://teagan-eleov.github.io/burn-font-host/guidebook.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <!-- jQuery + tooltips -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/malihu/jquery-style-my-tooltips/jquery.style-my-tooltips.js"></script>
    <script>
        (function ($) {
            $(function () {
                $("[title]").style_my_tooltips({
                    tip_follows_cursor: true,
                    tip_delay_time: 0,
                    tip_fade_speed: 300
                });
            });
        })(jQuery);
    </script>

    <title>FAQ</title>

    <!-- Complément CSS local (le gros vient de style.css / guidebook.css) -->
    <style>
        /* Layout principal — sera précisé en Étape 2 (sidebar gauche / résultats droite) */
        #guidebook_content {
            grid-template-columns: 300px 1fr;
        }

        /* ===== Toolbar & champs génériques ===== */
        .toolbar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin: 12px 0;
        }

        .toolbar .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: start;
            width: 100%;
        }

        .toolbar input[type="search"] {
            background: var(--surface-1);
            border: 1px solid var(--stroke-tertiary);
            color: var(--text-color);
            padding: 8px 10px;
            width: 100%;
        }

        .grid-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* ===== Boutons de filtres (style "tabs") ===== */
        .field .optionButton {
            width: fit-content;
            font-family: "Lora", "Merriweather Sans";
            font-weight: 400;
        }

        .filterset {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .secondary_card {
            padding: 24px;
            gap: 24px;
        }

        .panel {
            padding: 0;
        }

        /* ===== Sidebar FAQ ===== */
        #faq-sidebar {
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-self: start;
            overflow: auto;
            max-height: calc(100vh - 120px);
        }

        #faq-sidebar .toolbar {
            margin: 0;
        }

        #faq-filters {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .faq-category {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .faq-category .optionButton {
            width: fit-content;
        }

        .faq-category-title {}

        /* ===== Panel résultats (droite) ===== */
        .faq-results-card {
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        /* ===== Cards de questions (inspiré de faq_answer.html) ===== */
        .questionMessage {
            padding: 0;
            width: 100%;
        }

        .questionRow {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        .questionRow chipsrp {
            width: 100%;
            justify-content: flex-start !important;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .questionLabel {
            margin: 0;
        }

        .questionAnswer {
            line-height: 1.6;
            width: 100%;
        }

        .questionAnswer p {
            margin: 0 0 12px 0;
            max-width: 100% !important;
        }

        .questionAnswer p:last-child {
            margin-bottom: 0;
        }

        .questionAnswer ul {
            margin: 0 0 12px 0;
            padding-left: 24px;
        }

        .questionAnswer a {
            text-decoration: underline;
        }

        /* ===== Accordéon ===== */
        .questionHeader {
            cursor: pointer;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            user-select: none;
        }

        .questionHeaderBottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }

        .questionChevron {
            flex-shrink: 0;
            font-size: 18px;
            transition: transform 0.2s ease;
            opacity: 0.5;
        }

        .questionChevron.open {
            transform: rotate(180deg);
            opacity: 1;
        }

        /* ===== Compteur par filtre ===== */
        .filter-count {
            opacity: 0.5;
            font-size: 0.85em;
        }

        /* ===== Compteur de résultats ===== */
        #faq-count {
            font-size: 0.75em;
            margin-bottom: 8px;
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary, currentColor);
            opacity: 0.6;
        }

        /* ===== Empty state ===== */
        #empty-faq {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 24px 0;
            text-align: center;
        }

        #faq-reset-empty {
            width: fit-content;
        }
    </style>
</head>

<body id="modernbb" class="">
    <div id="background_blured"></div>

    <!-- HERO -->
    <div class="text_600 forum_content">
        <div id="hero">
            <div class="fog-layer"></div>
            <a id="hero_image" target="_blank" href="https://arsin-rpg.forumactif.com/forum"></a>
            <div id="hero_content" class="flexColumn">
                <div id="forumName">FAQ</div>
                <div id="hero_context_section" class="flexColumn">
                    <div class="blur_card" id="hero_contexte"><br />
                        Bienvenue sur la FAQ de Arsin.<br />
                        Retrouvez ici les questions/réponses utiles, filtrables par mots-clés.
                    </div>
                </div>
            </div>
            <div id="theme_selector" class="flexColumn">
                <input type="radio" id="input_blue" name="theme" value="blue" checked />
                <label for="input_blue" id="theme_button_blue" class="theme-button"></label>
                <input type="radio" id="input_green" name="theme" value="green" />
                <label for="input_green" id="theme_button_green" class="theme-button"></label>
                <input type="radio" id="input_gold" name="theme" value="gold" />
                <label for="input_gold" id="theme_button_gold" class="theme-button"></label>
                <input type="radio" id="input_licorne" name="theme" value="licorne" />
                <label for="input_licorne" id="theme_button_licorne" class="theme-button"></label>
                <input type="radio" id="input_red" name="theme" value="red" />
                <label for="input_red" id="theme_button_red" class="theme-button"></label>
            </div>
        </div>
    </div>


    <!-- LAYOUT FAQ -->
    <div id="guidebook" class="text_600">
        <div class="layout">
            <div id="guidebook_content">
                <!-- Sidebar (gauche) : champ recherche + liste des mots-clés groupés -->
                <aside id="faq-sidebar" class="secondary_card">
                    <div class="toolbar">
                        <div class="field">
                            <input id="q-faq" type="search" placeholder="Rechercher">
                        </div>
                        <div class="field">
                            <button type="button" id="faq-reset" class="tab-btn optionButton">
                                <div class="optionButtonContent">Réinitialiser</div>
                            </button>
                        </div>
                    </div>
                    <div id="faq-filters"></div>
                </aside>

                <!-- Résultats (droite) : liste des questions -->
                <section id="faq-results" class="panel active">
                    <div class="secondary_card faq-results-card">
                        <div id="faq-count" class="muted"></div>
                        <div id="list-faq" class="grid-list"></div>
                        <div id="empty-faq" style="display:none">
                            <p class="muted">Aucun résultat pour ces filtres.</p>
                            <p class="muted">Réinitialises tes filtres, ou va poser ta question dans la zone invité sur le forum, ou dans "Need-help" sur discord.</p>
                            <button type="button" id="faq-reset-empty" class="tab-btn optionButton">
                                <div class="optionButtonContent">Réinitialiser les filtres</div>
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- Moteur FAQ -->
    <script>
        (function ($) {
            "use strict";

            /* ===================== Utilitaires de comparaison ===================== */
            const norm = (s) => (s ?? '').toString().normalize('NFD').replace(/\p{Diacritic}/gu, '').toLowerCase().trim();
            const canon = (s) => norm(s).replace(/[\s\-_]+/g, '');

            /* ===================== Filtres multi-sélection (boutons "tabs") ===================== */
            function ensureAnyState($set) {
                const $any = $set.find('.filter-btn[data-value=""]');
                const $pressedSpecific = $set.find('.filter-btn[aria-selected="true"]').not($any);
                if ($pressedSpecific.length) { $any.attr('aria-selected', 'false'); }
                else { $any.attr('aria-selected', 'true'); $set.find('.filter-btn').not($any).attr('aria-selected', 'false'); }
            }
            function bindFiltersets(container, onChange) {
                $(container).on('click keydown', '.filterset .filter-btn', function (e) {
                    if (e.type === 'keydown' && !['Enter', ' '].includes(e.key)) return;
                    const $btn = $(this);
                    const $set = $btn.closest('.filterset');
                    const isAny = ($btn.data('value') + '') === '';
                    if (isAny) {
                        $set.find('.filter-btn').attr('aria-selected', 'false');
                        $btn.attr('aria-selected', 'true');
                    } else {
                        const pressed = $btn.attr('aria-selected') === 'true';
                        $btn.attr('aria-selected', pressed ? 'false' : 'true');
                        ensureAnyState($set);
                    }
                    if (typeof onChange === 'function') onChange();
                });
            }
            function getFilterValues($set) {
                return $set.find('.filter-btn[aria-selected="true"]').map(function () {
                    const v = ($(this).data('value') ?? '').toString();
                    return v === '' ? null : v;
                }).get().filter(Boolean);
            }

            /* ===================== Catégories de mots-clés =====================
               Map { "Nom de catégorie": [ "Mot-clé tel qu'écrit dans les questions", ... ] }
               - Les mots-clés non rangés ici atterriront automatiquement dans "Autres".
               - Pour créer une nouvelle catégorie : ajoute une clé. Tout est dynamique au boot.
            ============================================================= */
            const CATEGORIES = {
                "Magie":               ["Magie", "Alchimie", "Herboristerie", "Corruption", "Greffe"],
                "Groupes biologiques": ["Sorcières", "Chasseurs", "Cristallisés"],
                "Bestiaire":           ["Bestiaire", "Fantômes"],
                "Société":             ["Société", "Sexualité", "Éducation", "Géographie"],
                "Technologies":        ["Technologie"],
                "Groupes Sociaux":     ["Armée", "Pègre"]
            };
            const DEFAULT_CATEGORY = "Autres";

            /* ===================== Markdown léger ===================== */
            function escapeHtml(s) {
                return (s ?? '').toString()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function mdInline(s) {
                return s
                    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
                    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
            }

            function parseMarkdown(md) {
                if (!md) return '';
                const blocks = md.split(/\n\s*\n/);

                return blocks.map(raw => {
                    const block = raw.replace(/^\n+|\n+$/g, '');
                    if (!block) return '';
                    const lines = block.split('\n');

                    if (lines.every(l => /^\s*[-*]\s+/.test(l))) {
                        const items = lines.map(l =>
                            '<li>' + mdInline(l.replace(/^\s*[-*]\s+/, '').trim()) + '</li>'
                        );
                        return '<ul>' + items.join('') + '</ul>';
                    }

                    return '<p>' + lines.map(l => mdInline(l.trim())).join('<br>') + '</p>';
                }).filter(Boolean).join('');
            }

            /* ===================== Renderer cards ===================== */
            function chipTag(label) {
                return '<div class="chip flexRow"><span>' + escapeHtml(label) + '</span></div>';
            }

            function cardQuestion(entry) {
                const chips = (entry.keywords || []).map(chipTag).join('');
                const anchor = entry.id ? ('faq-' + entry.id) : '';
                return `
        <div class="message questionMessage scoopcorners colorborder offsetEffect"${anchor ? ' id="' + anchor + '"' : ''}>
          <div class="borders_top"><div></div><div></div></div>
          <div class="borders_bottom"><div></div><div></div></div>
          <div class="questionRow">
            <div class="questionHeader">
              <chipsrp>${chips}</chipsrp>
              <div class="questionHeaderBottom">
                <h4 class="questionLabel gradientTitle">${escapeHtml(entry.question || '')}</h4>
                <span class="questionChevron">▾</span>
              </div>
            </div>
            <div class="questionAnswer" style="display:none">${parseMarkdown(entry.answer || '')}</div>
          </div>
        </div>`;
            }

            function render() {
                const c = readControls();
                const arr = DATA.filter(e => matchesFilter(e, c));

                const $list = $('#list-faq').empty();
                const $empty = $('#empty-faq');
                const $count = $('#faq-count');

                if (!arr.length) {
                    $count.hide();
                    $list.hide();
                    $empty.show();
                    return;
                }
                $empty.hide();
                $list.show();
                const total = DATA.length;
                const isFiltered = c.keywords.length > 0 || c.q.trim().length > 0;
                const countText = isFiltered
                    ? arr.length + ' résultat' + (arr.length > 1 ? 's' : '') + ' sur ' + total
                    : total + ' résultat' + (total > 1 ? 's' : '');
                $count.text(countText).show();
                for (const entry of arr) {
                    $list.append(cardQuestion(entry));
                }
            }

            /* ===================== Sidebar dynamique ===================== */
            function buildSidebar(data, categories) {
                const allKeywords = [...new Set(
                    (data || []).flatMap(e => e.keywords || [])
                )];

                const kwToCat = new Map();
                for (const [catName, kws] of Object.entries(categories || {})) {
                    for (const kw of kws) kwToCat.set(canon(kw), catName);
                }

                const groups = {};
                for (const catName of Object.keys(categories || {})) groups[catName] = [];
                groups[DEFAULT_CATEGORY] = [];
                for (const kw of allKeywords) {
                    const cat = kwToCat.get(canon(kw)) || DEFAULT_CATEGORY;
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(kw);
                }

                const $container = $('#faq-filters').empty();
                for (const [cat, kws] of Object.entries(groups)) {
                    if (!kws.length) continue;
                    kws.sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));

                    const buttons = kws.map(kw => {
                        const count = (data || []).filter(e =>
                            (e.keywords || []).some(k => canon(k) === canon(kw))
                        ).length;
                        return `
                        <button type="button" class="tab-btn optionButton filter-btn" data-value="${escapeHtml(kw)}" aria-selected="false">
                            <div class="optionButtonContent">${escapeHtml(kw)} <span class="filter-count">${count}</span></div>
                        </button>`;
                    }).join('');

                    $container.append(`
                        <div class="faq-category">
                            <h4 class="gradientTitle faq-category-title">${escapeHtml(cat)}</h4>
                            <div class="filterset" data-category="${escapeHtml(cat)}" role="group" aria-label="Filtre ${escapeHtml(cat)}">
                                ${buttons}
                            </div>
                        </div>
                    `);
                }
            }

            /* ===================== Filtrage ===================== */
            function readControls() {
                return {
                    q: $('#q-faq').val() || '',
                    keywords: getFilterValues($('#faq-sidebar'))
                };
            }

            function matchesFilter(entry, c) {
                if (c.keywords.length) {
                    const entryKeys = (entry.keywords || []).map(canon);
                    const selected = c.keywords.map(canon);
                    if (!selected.some(k => entryKeys.includes(k))) return false;
                }
                if (c.q) {
                    const q = norm(c.q);
                    const hay = [
                        entry.question,
                        entry.answer,
                        (entry.keywords || []).join(' ')
                    ].map(norm).join(' ');
                    if (!hay.includes(q)) return false;
                }
                return true;
            }

            /* ===================== Boot ===================== */
            let RAW = [];
            let DATA = [];

            $(function () {
                // Bind des contrôles (indépendant du chargement des données)
                bindFiltersets('#faq-sidebar', render);
                $('#q-faq').on('input', render);

                // Accordéon
                $('#list-faq').on('click', '.questionHeader', function () {
                    $(this).siblings('.questionAnswer').slideToggle(200);
                    $(this).find('.questionChevron').toggleClass('open');
                });
                function resetFilters() {
                    $('#faq-filters .filter-btn').attr('aria-selected', 'false');
                    $('#q-faq').val('');
                    render();
                }
                $('#faq-reset').on('click', resetFilters);
                $('#faq-results').on('click', '#faq-reset-empty', resetFilters);

                // Chargement des données depuis le JSON externe
                fetch('faq.json')
                    .then(r => r.json())
                    .then(data => {
                        RAW = data;
                        DATA = RAW;
                        buildSidebar(DATA, CATEGORIES);
                        render();
                    })
                    .catch(err => {
                        console.error('Erreur chargement FAQ :', err);
                        $('#empty-faq').text('Impossible de charger les données.').show();
                    });
            });

            /* ===================== API publique ===================== */
            window.FAQ = {
                _debug: () => ({ RAW, DATA })
            };
        })(jQuery);
    </script>

</body>

</html>
